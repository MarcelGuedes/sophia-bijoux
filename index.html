<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sophia Bijoux</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #ffd6ec, #f2d6ff);
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .app {
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 30px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .header {
      background: linear-gradient(to right, #ff69b4, #c084fc);
      color: white;
      text-align: center;
      padding: 30px 20px;
    }

    .header h1 {
      margin: 0;
      font-size: 38px;
    }

    .header p {
      margin-top: 10px;
      font-size: 18px;
    }

    .produto {
      background: #fff0f7;
      margin: 15px;
      padding: 15px;
      border-radius: 20px;
      border: 2px solid #ffd1e8;
    }

    .produto h2 {
      margin: 0 0 10px 0;
      color: #555;
      font-size: 20px;
    }

    .preco {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .preco span {
      background: white;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-weight: bold;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      border: 2px solid #ffc0dd;
      font-size: 22px;
      color: #ff4fa3;
      font-weight: bold;
    }

    .botao {
      margin: 20px;
    }

    button {
      width: 100%;
      border: none;
      background: #25d366;
      color: white;
      padding: 18px;
      font-size: 20px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: bold;
    }

    .galeria {
      padding: 20px;
      text-align: center;
    }

    .galeria h2 {
      color: #c084fc;
      margin-bottom: 15px;
    }

    .fotos {
      display: flex;
      justify-content: center;
      gap: 15px;
    }

    .foto {
      width: 80px;
      height: 80px;
      background: #fff0f7;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      border: 2px solid #ffd1e8;
      transition: transform 0.3s;
    }

    .foto:hover {
      transform: scale(1.1);
    }

    .footer {
      text-align: center;
      padding: 25px;
      background: #fff5fa;
    }

    .footer h3 {
      color: #ff4fa3;
      margin-bottom: 10px;
    }

    .footer p {
      color: #666;
    }
  </style>
</head>
<body>

<div class="app">

  <div class="header">
    <h1>✨ Sophia Bijoux ✨</h1>
    <p>Tabela de Preços</p>
  </div>

  <div id="produtos"></div>

  <div class="botao">
    <button onclick="abrirTeams()">
      💻 Abrir Teams Sophia Bijoux
    </button>
  </div>

  <div class="galeria">
    <h2>✨ Novidades da Sophia ✨</h2>

    <div class="fotos">
      <div class="foto">🎀</div>
      <div class="foto">💖</div>
      <div class="foto">🌈</div>
    </div>
  </div>

  <div class="footer">
    <h3>💖 Obrigada pela preferência 💖</h3>
    <p>✨ Que Deus abençoe você sempre ✨</p>
  </div>

</div>

<script>
  const produtosIniciais = [
    { nome: 'Pulseira Normal', preco: 2 },
    { nome: 'Pulseira Colorida', preco: 3 },
    { nome: 'Pulseira Personalizada', preco: 4 },
    { nome: 'Pulseira com Brinde', preco: 5 },
    { nome: 'Anel', preco: 1 }
  ];

  const produtosSalvos = localStorage.getItem('sophia-bijoux');

  let produtos = produtosSalvos
    ? JSON.parse(produtosSalvos)
    : produtosIniciais;

  const container = document.getElementById('produtos');

  function renderizar() {
    container.innerHTML = '';

    produtos.forEach((produto, index) => {
      container.innerHTML += `
        <div class="produto">
          <h2>${produto.nome}</h2>

          <div class="preco">
            <span>R$</span>

            <input
              type="number"
              step="0.50"
              value="${produto.preco}"
              onchange="alterarPreco(${index}, this.value)"
            />
          </div>
        </div>
      `;
    });
  }

  function alterarPreco(index, valor) {
    produtos[index].preco = valor;

    localStorage.setItem(
      'sophia-bijoux',
      JSON.stringify(produtos)
    );
  }

  function abrirTeams() {
    window.open('https://teams.microsoft.com', '_blank');
  }

  renderizar();
</script>

</body>
</html>
