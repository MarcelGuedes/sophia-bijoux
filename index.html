<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Sophia Bijoux</title>

  <!-- Biblioteca que gera imagem PNG -->

  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

  <style>

    body{

      margin:0;

      padding:20px;

      background:#dcdcdc;

      display:flex;

      justify-content:center;

      font-family:"Times New Roman", serif;

    }

    /* ÁREA DA LISTA */

    .lista{

      width:100%;

      max-width:700px;

      background:#ececec;

      padding:25px;

      border:1px solid #ccc;

    }

    /* TOPO */

    .topo{

      text-align:center;

      margin-bottom:50px;

    }

    .topo h1{

      display:inline-block;

      border-bottom:5px solid black;

      padding-bottom:5px;

      font-size:38px;

      margin:0;

      font-weight:bold;

    }

    /* TITULO */

    .titulo{

      font-size:34px;

      font-weight:bold;

      margin-bottom:35px;

    }

    /* ITENS */

    .item{

      font-size:36px;

      margin-bottom:18px;

    }

    /* MENSAGEM */

    .mensagem{

      text-align:center;

      margin-top:40px;

      font-size:34px;

      font-style:italic;

      line-height:1.5;

    }

    .assinatura{

      text-align:center;

      margin-top:25px;

      font-size:34px;

    }

    /* LOGO */

    .logo{

      text-align:center;

      margin-top:60px;

    }

    .logo img{

      width:220px;

    }

    /* BOTÃO */

    .acoes{

      margin-top:40px;

      text-align:center;

    }

    button{

      background:#ff1493;

      color:white;

      border:none;

      padding:18px 30px;

      border-radius:18px;

      font-size:24px;

      font-weight:bold;

      cursor:pointer;

      box-shadow:
      0 5px 15px rgba(0,0,0,0.2);

    }

    button:hover{

      transform:scale(1.03);

    }

    /* ESCONDER BOTÃO NA IMAGEM */

    .ocultar{

      display:none;

    }

  </style>

</head>

<body>

  <!-- ÁREA QUE VIRA IMAGEM -->

  <div
    class="lista"
    id="listaImagem"
  >

    <!-- TOPO -->

    <div class="topo">

      <h1>
        ✨ SOPHIA BIJOUX ✨
      </h1>

    </div>

    <!-- TITULO -->

    <div class="titulo">

      Tabela de Preços

    </div>

    <!-- PRODUTOS -->

    <div id="produtos"></div>

    <!-- MENSAGEM -->

    <div class="mensagem">

      💌 Obrigado por comprar comigo!

      <br>

      ✨ Que Deus abençoe você sempre! ✨

    </div>

    <!-- ASSINATURA -->

    <div class="assinatura">

      😊 Sophia Bijoux

    </div>

    <!-- LOGO -->

    <div class="logo">

      <img
        src="https://i.imgur.com/JD5qM8L.png"
      >

    </div>

  </div>

  <!-- BOTÃO -->

  <div class="acoes" id="botoes">

    <button onclick="gerarImagem()">

      📸 GERAR IMAGEM PNG

    </button>

  </div>

  <script>

    // PRODUTOS

    const produtosIniciais = [

      {
        emoji:'💖',
        nome:'Pulseira Normal',
        preco:2
      },

      {
        emoji:'🌈',
        nome:'Pulseira Colorida',
        preco:3
      },

      {
        emoji:'✨',
        nome:'Pulseira Personalizada',
        preco:4
      },

      {
        emoji:'🎁',
        nome:'Pulseira com Brinde',
        preco:5
      },

      {
        emoji:'💍',
        nome:'Anel',
        preco:1
      }

    ];

    // LOCAL STORAGE

    const produtosSalvos =
      localStorage.getItem(
        'sophia-bijoux'
      );

    let produtos = produtosSalvos
      ? JSON.parse(produtosSalvos)
      : produtosIniciais;

    // CONTAINER

    const container =
      document.getElementById(
        'produtos'
      );

    // RENDERIZAR

    function renderizar(){

      container.innerHTML = '';

      produtos.forEach(
        (produto, index) => {

        container.innerHTML += `

          <div class="item">

            ${produto.emoji}

            ${produto.nome}

            —

            R$

            <input

              type="number"

              value="${produto.preco}"

              step="0.50"

              onchange="
                alterarPreco(
                  ${index},
                  this.value
                )
              "

              style="
                width:90px;
                font-size:34px;
                border:none;
                background:transparent;
                font-family:'Times New Roman';
              "

            >

          </div>

        `;

      });

    }

    // ALTERAR PREÇO

    function alterarPreco(
      index,
      valor
    ){

      produtos[index].preco = valor;

      localStorage.setItem(

        'sophia-bijoux',

        JSON.stringify(produtos)

      );

    }

    // GERAR PNG

    async function gerarImagem(){

      // ESCONDE BOTÃO

      document
        .getElementById(
          'botoes'
        )
        .classList
        .add('ocultar');

      const elemento =
        document.getElementById(
          'listaImagem'
        );

      const canvas =
        await html2canvas(
          elemento,
          {
            scale:3
          }
        );

      const imagem =
        canvas.toDataURL(
          'image/png'
        );

      const link =
        document.createElement('a');

      link.download =
        'lista-sophia-bijoux.png';

      link.href = imagem;

      link.click();

      // MOSTRA BOTÃO NOVAMENTE

      document
        .getElementById(
          'botoes'
        )
        .classList
        .remove('ocultar');

    }

    renderizar();

  </script>

</body>

</html>
