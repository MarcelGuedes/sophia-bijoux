<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

 <title>Sophia Bijoux</title>

<link rel="manifest" href="./manifest.json">

<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">

<link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png">

<meta name="theme-color" content="#ff69b4">

  <!-- Biblioteca para gerar imagem -->

  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

 <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{

      font-family:'Poppins', sans-serif;

      background:
      linear-gradient(
        135deg,
        #ffd6ec 0%,
        #f3d9ff 45%,
        #dfe7ff 100%
      );

      display:flex;

      justify-content:center;

      padding:25px 15px;

      min-height:100vh;

      overflow-x:hidden;

    }

    /* APP */

    .app{

      width:100%;

      max-width:430px;

      background:
        rgba(255,255,255,0.72);

      backdrop-filter:
        blur(18px);

      border-radius:38px;

      overflow:hidden;

      box-shadow:
        0 20px 45px rgba(0,0,0,0.12);

      border:
        1px solid rgba(255,255,255,0.5);

      animation:
        aparecer 0.7s ease;

    }

    /* ANIMAÇÃO */

    @keyframes aparecer{

      from{

        opacity:0;

        transform:
          translateY(20px);

      }

      to{

        opacity:1;

        transform:
          translateY(0);

      }

    }

    /* HEADER */

    .header{

      background:
      linear-gradient(
        135deg,
        #ff5fb2,
        #c084fc
      );

      color:white;

      text-align:center;

      padding:60px 25px 50px;

      position:relative;

      overflow:hidden;

    }

    .header::before{

      content:'';

      position:absolute;

      width:220px;

      height:220px;

      background:
        rgba(255,255,255,0.12);

      border-radius:50%;

      top:-80px;

      right:-80px;

    }

    .header h1{

      font-size:44px;

      font-weight:700;

      letter-spacing:1px;

      margin-bottom:12px;

      position:relative;

      z-index:2;

    }

    .header p{

      font-size:19px;

      opacity:0.96;

      position:relative;

      z-index:2;

    }

    /* PRODUTOS */

    .produto{

      background:white;

      margin:22px;

      padding:24px;

      border-radius:26px;

      box-shadow:
        0 10px 25px rgba(0,0,0,0.08);

      transition:0.3s;

    }

    .produto:hover{

      transform:
        translateY(-4px);

    }

    .produto h2{

      color:#555;

      margin-bottom:18px;

      font-size:22px;

      font-weight:600;

    }

    /* PREÇO */

   .preco{

  display:flex;

  align-items:center;

  gap:12px;

  width:100%;

}

    .preco span{

      background:#fff4fa;

      padding:14px 18px;

      border-radius:16px;

      font-weight:700;

      font-size:22px;

      color:#ff1493;

    }

    /* INPUT */

   input{

  width:100%;

  min-width:0;

  flex:1;

  padding:16px;

  border-radius:16px;

  border:none;

  background:#fff7fc;

  font-size:22px;

  color:#ff1493;

  font-weight:700;

  outline:none;

  box-shadow:
    inset 0 2px 5px rgba(0,0,0,0.05);

}

    /* BOTÕES */

    .botoes{

      padding:8px 22px 25px;

    }

    button{

      width:100%;

      border:none;

      color:white;

      padding:22px;

      font-size:20px;

      border-radius:24px;

      cursor:pointer;

      font-weight:600;

      margin-bottom:18px;

      transition:0.3s;

      box-shadow:
        0 10px 20px rgba(0,0,0,0.15);

    }

    button:hover{

      transform:
        translateY(-3px);

    }

    .btn-teams{

      background:
      linear-gradient(
        135deg,
        #25d366,
        #14b85a
      );

    }

    .btn-imagem{

      background:
      linear-gradient(
        135deg,
        #ff4fa3,
        #ff1493
      );

    }

    /* GALERIA */

    .galeria{

      padding:10px 25px 35px;

      text-align:center;

    }

    .galeria h2{

      color:#b56fff;

      margin-bottom:28px;

      font-size:28px;

    }

    .fotos{

      display:flex;

      justify-content:center;

      gap:18px;

    }

    .foto{

      width:95px;

      height:95px;

      background:white;

      border-radius:28px;

      display:flex;

      align-items:center;

      justify-content:center;

      font-size:42px;

      box-shadow:
        0 8px 18px rgba(0,0,0,0.08);

      transition:0.3s;

    }

    .foto:hover{

      transform:
        scale(1.08)
        rotate(3deg);

    }

    /* FOOTER */

    .footer{

      text-align:center;

      padding:30px 20px;

      background:
        rgba(255,255,255,0.35);

    }

    .footer h3{

      color:#ff1493;

      margin-bottom:12px;

      font-size:25px;

    }

    .footer p{

      color:#666;

      font-size:17px;

    }

    /* LOGO */

    .logo-area{

      text-align:center;

      padding:10px 20px;

    }

    .logo-area img{

      width:190px;

      filter:
        drop-shadow(
          0 6px 10px rgba(0,0,0,0.15)
        );

    }

    /* ASSINATURA */

    .assinatura{

      text-align:center;

      padding:10px 20px 40px;

      font-size:32px;

      color:#c084fc;

      font-weight:700;

    }

  </style>

</head>

<body>

  <div
    class="app"
    id="listaImagem"
  >

    <div class="header">

      <h1>
        ✨ Sophia Bijoux ✨
      </h1>

      <p>
        Tabela de Preços
      </p>

    </div>

    <!-- PRODUTOS -->

    <div id="produtos"></div>

    <!-- BOTÕES -->

    <div class="botoes">

      <button
        class="btn-teams"
        onclick="abrirTeams()"
      >
        💻 Abrir Teams Sophia Bijoux
      </button>

      <button
        class="btn-imagem"
        onclick="gerarImagem()"
      >
        📸 GERAR IMAGEM DA LISTA
      </button>

    </div>

    <!-- GALERIA -->

    <div class="galeria">

      <h2>
        ✨ Novidades da Sophia ✨
      </h2>

      <div class="fotos">

        <div class="foto">🎀</div>

        <div class="foto">💖</div>

        <div class="foto">🌈</div>

      </div>

    </div>

    <!-- RODAPÉ -->

    <div class="footer">

      <h3>
        💖 Obrigada pela preferência 💖
      </h3>

      <p>
        ✨ Que Deus abençoe você sempre ✨
      </p>

    </div>

    <div style="
  text-align:center;
  margin-top:20px;
">

  <img
    src="images/Logo Sophia .png"
    style="
      width:180px;
    "
  >

</div>

<div class="assinatura">

  😊 Sophia Bijoux

</div>

  </div>

  <script>

    // PRODUTOS

    const produtosIniciais = [

      {
        nome:'💖 Pulseira Normal',
        preco:2
      },

      {
        nome:'🌈 Pulseira Colorida',
        preco:3
      },

      {
        nome:'✨ Pulseira Personalizada',
        preco:4
      },

      {
        nome:'🎁 Pulseira com Brinde',
        preco:5
      },

      {
        nome:'💍 Anel',
        preco:1
      }

    ];

    // SALVA DADOS

    const produtosSalvos =
      localStorage.getItem(
        'sophia-bijoux'
      );

    let produtos = produtosSalvos
      ? JSON.parse(produtosSalvos)
      : produtosIniciais;

    // CONTAINER

    const container =
      document.getElementById(
        'produtos'
      );

    // RENDERIZA

    function renderizar(){

      container.innerHTML = '';

      produtos.forEach(
        (produto, index) => {

        container.innerHTML += `

          <div class="produto">

            <h2>
              ${produto.nome}
            </h2>

            <div class="preco">

              <span>
                R$
              </span>

              <input

                type="number"

                step="0.50"

                value="${produto.preco}"

                onchange="
                  alterarPreco(
                    ${index},
                    this.value
                  )
                "

              />

            </div>

          </div>

        `;

      });

    }

    // ALTERAR PREÇO

    function alterarPreco(
      index,
      valor
    ){

      produtos[index].preco = valor;

      localStorage.setItem(

        'sophia-bijoux',

        JSON.stringify(produtos)

      );

    }

    // TEAMS

    function abrirTeams(){

      window.location.href =
        'msteams://';

    }

    // GERAR IMAGEM PERSONALIZADA

    async function gerarImagem(){

      // CRIA ÁREA TEMPORÁRIA

      const area =
        document.createElement('div');

      area.style.width = '800px';

area.style.background = '#ffffff';

      area.style.padding = '40px';

      area.style.fontFamily =
        '"Times New Roman", serif';

      area.style.position = 'absolute';

      area.style.left = '-9999px';

      area.innerHTML = `

        <div style="
          text-align:center;
          margin-bottom:70px;
        ">

          <h1 style="
            display:inline-block;
            border-bottom:5px solid black;
            padding-bottom:5px;
            font-size:48px;
            font-weight:bold;
          ">

            ✨ SOPHIA BIJOUX ✨

          </h1>

        </div>

        <div style="
          font-size:42px;
          font-weight:bold;
          margin-bottom:40px;
        ">

          Tabela de Preços

        </div>

        ${produtos.map(produto => `

          <div style="
            font-size:38px;
            margin-bottom:20px;
          ">

            ${produto.nome}

            — R$ ${Number(produto.preco)
              .toFixed(2)
              .replace('.', ',')}

          </div>

        `).join('')}

        <div style="
          text-align:center;
          margin-top:60px;
          font-size:38px;
          font-style:italic;
          line-height:1.7;
        ">

          💌 Obrigado por comprar comigo!

          <br>

          ✨ Que Deus abençoe você sempre! ✨

        </div>

        <div style="
          text-align:center;
          margin-top:35px;
          font-size:42px;
        ">

          😊 Sophia Bijoux

        </div>

        <div style="
          text-align:center;
          margin-top:70px;
        ">

          <img
          src='images/Logo Sophia .png'
            style='width:240px;'
          >

        </div>

      `;

      // ADICIONA NO BODY

      document.body.appendChild(area);

      // GERA IMAGEM

      const canvas =
        await html2canvas(
          area,
          {
            scale:3,
            useCORS:true
          }
        );

      // REMOVE ÁREA TEMPORÁRIA

      document.body.removeChild(area);

// ESPERA IMAGENS CARREGAREM

const imagens =
  area.querySelectorAll('img');

await Promise.all(

  [...imagens].map(img => {

    return new Promise(resolve => {

      if(img.complete){

        resolve();

      } else {

        img.onload = resolve;

        img.onerror = resolve;

      }

    });

  })

);


      
      // CONVERTE PNG

      const imagem =
        canvas.toDataURL(
          'image/png'
        );

      // DOWNLOAD

      const link =
        document.createElement('a');

      link.download =
        'lista-sophia-bijoux.png';

      link.href = imagem;

      link.click();

    }

    // INICIAR

    renderizar();

  </script>

</body>

</html>
