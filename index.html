<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

 <title>Sophia Bijoux</title>

<link rel="manifest" href="./manifest.json">

<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">

<link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png">

<meta name="theme-color" content="#ff69b4">

  <!-- Biblioteca para gerar imagem -->

  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{

      font-family:Arial, sans-serif;

      background:
      linear-gradient(
        to bottom,
        #ffd6ec,
        #f2d6ff
      );

      display:flex;

      justify-content:center;

      padding:20px;

      min-height:100vh;

    }

    .app{

      width:100%;

      max-width:420px;

      background:white;

      border-radius:30px;

      overflow:hidden;

      box-shadow:
      0 10px 30px rgba(0,0,0,0.2);

    }

    .header{

      background:
      linear-gradient(
        to right,
        #ff69b4,
        #c084fc
      );

      color:white;

      text-align:center;

      padding:35px 20px;

    }

    .header h1{

      font-size:38px;

      margin-bottom:10px;

    }

    .header p{

      font-size:18px;

    }

    .produto{

      background:#fff0f7;

      margin:15px;

      padding:18px;

      border-radius:20px;

      border:2px solid #ffd1e8;

    }

    .produto h2{

      color:#555;

      margin-bottom:12px;

      font-size:22px;

    }

    .preco{

      display:flex;

      align-items:center;

      gap:10px;

    }

    .preco span{

      background:white;

      padding:12px;

      border-radius:12px;

      border:1px solid #ddd;

      font-weight:bold;

      font-size:22px;

    }

    input{

      flex:1;

      padding:14px;

      border-radius:14px;

      border:2px solid #ffc0dd;

      font-size:24px;

      color:#ff1493;

      font-weight:bold;

      outline:none;

    }

    .botoes{

      padding:20px;

    }

    button{

      width:100%;

      border:none;

      color:white;

      padding:20px;

      font-size:22px;

      border-radius:20px;

      cursor:pointer;

      font-weight:bold;

      margin-bottom:15px;

      transition:0.3s;

    }

    button:hover{

      transform:scale(1.03);

    }

    .btn-teams{

      background:#25d366;

    }

    .btn-imagem{

      background:#ff1493;

      box-shadow:
      0 5px 15px rgba(0,0,0,0.2);

    }

    .galeria{

      padding:20px;

      text-align:center;

    }

    .galeria h2{

      color:#c084fc;

      margin-bottom:20px;

    }

    .fotos{

      display:flex;

      justify-content:center;

      gap:15px;

    }

    .foto{

      width:85px;

      height:85px;

      background:#fff0f7;

      border-radius:20px;

      display:flex;

      align-items:center;

      justify-content:center;

      font-size:40px;

      border:2px solid #ffd1e8;

      transition:0.3s;

    }

    .foto:hover{

      transform:scale(1.1);

    }

    .footer{

      text-align:center;

      padding:25px;

      background:#fff5fa;

    }

    .footer h3{

      color:#ff1493;

      margin-bottom:12px;

      font-size:24px;

    }

    .footer p{

      color:#666;

      font-size:18px;

    }

    .assinatura{

      text-align:center;

      padding:20px 20px 35px;

      font-size:30px;

      color:#c084fc;

      font-weight:bold;

    }

  </style>

</head>

<body>

  <div
    class="app"
    id="listaImagem"
  >

    <div class="header">

      <h1>
        ✨ Sophia Bijoux ✨
      </h1>

      <p>
        Tabela de Preços
      </p>

    </div>

    <!-- PRODUTOS -->

    <div id="produtos"></div>

    <!-- BOTÕES -->

    <div class="botoes">

      <button
        class="btn-teams"
        onclick="abrirTeams()"
      >
        💻 Abrir Teams Sophia Bijoux
      </button>

      <button
        class="btn-imagem"
        onclick="gerarImagem()"
      >
        📸 GERAR IMAGEM DA LISTA
      </button>

    </div>

    <!-- GALERIA -->

    <div class="galeria">

      <h2>
        ✨ Novidades da Sophia ✨
      </h2>

      <div class="fotos">

        <div class="foto">🎀</div>

        <div class="foto">💖</div>

        <div class="foto">🌈</div>

      </div>

    </div>

    <!-- RODAPÉ -->

    <div class="footer">

      <h3>
        💖 Obrigada pela preferência 💖
      </h3>

      <p>
        ✨ Que Deus abençoe você sempre ✨
      </p>

    </div>

    <div style="
  text-align:center;
  margin-top:20px;
">

  <img
    src="images/Logo Sophia .png"
    style="
      width:180px;
    "
  >

</div>

<div class="assinatura">

  😊 Sophia Bijoux

</div>

  </div>

  <script>

    // PRODUTOS

    const produtosIniciais = [

      {
        nome:'💖 Pulseira Normal',
        preco:2
      },

      {
        nome:'🌈 Pulseira Colorida',
        preco:3
      },

      {
        nome:'✨ Pulseira Personalizada',
        preco:4
      },

      {
        nome:'🎁 Pulseira com Brinde',
        preco:5
      },

      {
        nome:'💍 Anel',
        preco:1
      }

    ];

    // SALVA DADOS

    const produtosSalvos =
      localStorage.getItem(
        'sophia-bijoux'
      );

    let produtos = produtosSalvos
      ? JSON.parse(produtosSalvos)
      : produtosIniciais;

    // CONTAINER

    const container =
      document.getElementById(
        'produtos'
      );

    // RENDERIZA

    function renderizar(){

      container.innerHTML = '';

      produtos.forEach(
        (produto, index) => {

        container.innerHTML += `

          <div class="produto">

            <h2>
              ${produto.nome}
            </h2>

            <div class="preco">

              <span>
                R$
              </span>

              <input

                type="number"

                step="0.50"

                value="${produto.preco}"

                onchange="
                  alterarPreco(
                    ${index},
                    this.value
                  )
                "

              />

            </div>

          </div>

        `;

      });

    }

    // ALTERAR PREÇO

    function alterarPreco(
      index,
      valor
    ){

      produtos[index].preco = valor;

      localStorage.setItem(

        'sophia-bijoux',

        JSON.stringify(produtos)

      );

    }

    // TEAMS

    function abrirTeams(){

      window.location.href =
        'msteams://';

    }

    // GERAR IMAGEM PERSONALIZADA

    async function gerarImagem(){

      // CRIA ÁREA TEMPORÁRIA

      const area =
        document.createElement('div');

      area.style.width = '800px';

      area.style.background = '#e5e5e5';

      area.style.padding = '40px';

      area.style.fontFamily =
        '"Times New Roman", serif';

      area.style.position = 'absolute';

      area.style.left = '-9999px';

      area.innerHTML = `

        <div style="
          text-align:center;
          margin-bottom:70px;
        ">

          <h1 style="
            display:inline-block;
            border-bottom:5px solid black;
            padding-bottom:5px;
            font-size:48px;
            font-weight:bold;
          ">

            ✨ SOPHIA BIJOUX ✨

          </h1>

        </div>

        <div style="
          font-size:42px;
          font-weight:bold;
          margin-bottom:40px;
        ">

          Tabela de Preços

        </div>

        ${produtos.map(produto => `

          <div style="
            font-size:38px;
            margin-bottom:20px;
          ">

            ${produto.nome}

            — R$ ${Number(produto.preco)
              .toFixed(2)
              .replace('.', ',')}

          </div>

        `).join('')}

        <div style="
          text-align:center;
          margin-top:60px;
          font-size:38px;
          font-style:italic;
          line-height:1.7;
        ">

          💌 Obrigado por comprar comigo!

          <br>

          ✨ Que Deus abençoe você sempre! ✨

        </div>

        <div style="
          text-align:center;
          margin-top:35px;
          font-size:42px;
        ">

          😊 Sophia Bijoux

        </div>

        <div style="
          text-align:center;
          margin-top:70px;
        ">

          <img
          src='images/Logo Sophia .png'
            style='width:240px;'
          >

        </div>

      `;

      // ADICIONA NO BODY

      document.body.appendChild(area);

      // GERA IMAGEM

      const canvas =
        await html2canvas(
          area,
          {
            scale:3,
            useCORS:true
          }
        );

      // REMOVE ÁREA TEMPORÁRIA

      document.body.removeChild(area);

// ESPERA IMAGENS CARREGAREM

const imagens =
  area.querySelectorAll('img');

await Promise.all(

  [...imagens].map(img => {

    return new Promise(resolve => {

      if(img.complete){

        resolve();

      } else {

        img.onload = resolve;

        img.onerror = resolve;

      }

    });

  })

);


      
      // CONVERTE PNG

      const imagem =
        canvas.toDataURL(
          'image/png'
        );

      // DOWNLOAD

      const link =
        document.createElement('a');

      link.download =
        'lista-sophia-bijoux.png';

      link.href = imagem;

      link.click();

    }

    // INICIAR

    renderizar();

  </script>

</body>

</html>
